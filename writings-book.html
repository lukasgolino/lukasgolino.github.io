<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --panel: rgba(255, 255, 255, 0.84);
            --ink: #0f1720;
            --muted: #516273;
            --line: rgba(15, 23, 32, 0.1);
            --accent: #1f7a8c;
            --shadow: 0 16px 50px rgba(10, 25, 41, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 12%, rgba(31, 122, 140, 0.2), transparent 34%),
                radial-gradient(circle at 86% 18%, rgba(191, 219, 247, 0.6), transparent 30%),
                linear-gradient(160deg, #edf2f7 0%, #f8fafc 45%, #e9f1f8 100%);
            padding: 2rem 1rem;
        }

        main {
            width: min(1100px, 100%);
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 22px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .hero,
        .viewer-wrap {
            padding: 2.2rem clamp(1.1rem, 2.5vw, 2.4rem);
        }

        .hero {
            border-bottom: 1px solid var(--line);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.9rem);
            letter-spacing: -0.03em;
        }

        p {
            color: var(--muted);
            line-height: 1.7;
        }

        .viewer {
            width: 100%;
            height: min(78vh, 980px);
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #ffffff;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .actions a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .actions a:hover,
        .actions a:focus-visible {
            text-decoration: underline;
            outline: none;
        }
    </style>
</head>

<body>
    <main>
        <section class="hero">
            <h1>Book</h1>
            <p>
                This page is ready to display your full book. Place the PDF at /assets/book/book.pdf and it will load here automatically.
            </p>
        </section>

        <section class="viewer-wrap">
            <iframe class="viewer" src="/assets/book/book.pdf" title="Book PDF viewer"></iframe>
            <div class="actions">
                <a href="/assets/book/book.pdf">Open PDF directly</a>
                <a href="/writings.html">Back to Writings</a>
                <a href="/">Back to Home</a>
            </div>
        </section>
    </main>
</body>

</html>
