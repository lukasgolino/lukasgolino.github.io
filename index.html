<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #f3f6f9;
            --panel: rgba(255, 255, 255, 0.75);
            --ink: #0f1720;
            --muted: #516273;
            --line: rgba(15, 23, 32, 0.08);
            --accent: #1f7a8c;
            --accent-2: #bfdbf7;
            --shadow: 0 16px 50px rgba(10, 25, 41, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 20%, rgba(31, 122, 140, 0.2), transparent 38%),
                radial-gradient(circle at 88% 18%, rgba(191, 219, 247, 0.65), transparent 30%),
                linear-gradient(160deg, #edf2f7 0%, #f8fafc 45%, #e9f1f8 100%);
            display: grid;
            place-items: center;
            padding: 2rem 1rem;
        }

        main {
            width: min(980px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: 22px;
            backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .hero {
            padding: 3rem clamp(1.2rem, 2.5vw, 2.5rem) 1.6rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 3.5vw, 3.4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .tagline {
            margin-top: 0.9rem;
            max-width: 65ch;
            color: var(--muted);
            font-size: clamp(1rem, 1.7vw, 1.15rem);
            line-height: 1.65;
        }

        .links {
            padding: 1rem clamp(1.2rem, 2.5vw, 2.5rem) 2.6rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.9rem;
        }

        .link-card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 0.95rem 1rem;
            background: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            color: var(--ink);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .link-card:hover,
        .link-card:focus-visible {
            transform: translateY(-3px);
            border-color: rgba(31, 122, 140, 0.45);
            box-shadow: 0 10px 20px rgba(31, 122, 140, 0.16);
            outline: none;
        }

        .link-card strong {
            display: block;
            font-size: 0.98rem;
            margin-bottom: 0.2rem;
        }

        .link-card span {
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .hero {
                padding-top: 2.3rem;
            }

            .links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <main>
        <section class="hero">
            <h1>Dr Lukas Golino, MMath, PhD</h1>
            <p class="tagline">
                This is my personal website for writings, projects, and research. Explore the
                subpages below for everything about me.
            </p>
        </section>

        <nav class="links" aria-label="Subpages">
            <a class="link-card" href="/aboutme.html">
                <strong>About Me</strong>
                <span>Background and timeline</span>
            </a>
            <a class="link-card" href="/writings.html">
                <strong>Writings</strong>
                <span>Stories and poetry</span>
            </a>
            <a class="link-card" href="/travels.html">
                <strong>Travels</strong>
                <span>Photos from around the world</span>
            </a>
            <a class="link-card" href="/research.html">
                <strong>Research</strong>
                <span>Publications </span>
            </a>
            <a class="link-card" href="/contact.html">
                <strong>Contact</strong>
                <span>Ways to get in touch</span>
            </a>
        </nav>
    </main>
</body>

</html>
